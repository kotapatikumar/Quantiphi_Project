<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Subscription Tracker Dashboard</h1>

    <!-- Form -->

    <div class="form-box">

        <input
            type="text"
            id="serviceName"
            placeholder="Service Name">

        <input
            type="number"
            id="cost"
            placeholder="Cost">

        <select id="billingCycle">
            <option value="Monthly">Monthly</option>
            <option value="Yearly">Yearly</option>
        </select>

        <input
            type="date"
            id="renewalDate">

        <button onclick="addSubscription()">
            Add Subscription
        </button>

    </div>

    <!-- Metrics -->

    <div class="cards">

        <div class="card">
            <h3>Monthly Burn Rate</h3>
            <h2 id="burnRate">₹0</h2>
        </div>

        <div class="card">
            <h3>Upcoming Renewals</h3>
            <h2 id="renewals">0</h2>
        </div>

    </div>

    <!-- Table -->

    <table>

        <thead>

            <tr>
                <th>Service</th>
                <th>Cost</th>
                <th>Billing</th>
                <th>Renewal Date</th>
                <th>Status</th>
            </tr>

        </thead>

        <tbody id="tableBody">

        </tbody>

    </table>

    <script src="script.js"></script>

</body>

</html>
